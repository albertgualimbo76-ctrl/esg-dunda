<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistências Direção</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f1f5f9;
margin:0;
padding:0;
}

/* BOTÃO VOLTAR */
.back-btn{
position:fixed;
top:20px;
left:20px;
font-size:20px;
cursor:pointer;
background:#06b6d4;
color:white;
padding:8px 12px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:.3s;
z-index:1000;
}
.back-btn:hover{
background:#0891b2;
}

.container{
max-width:1400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
overflow-x:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#0f172a;
}

form{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
}

form input, form select{
padding:10px;
border-radius:6px;
border:1px solid #cbd5e1;
flex:1;
min-width:150px;
}

form button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#06b6d4;
color:white;
cursor:pointer;
transition:.3s;
}

form button:hover{
background:#0891b2;
}

.status-checkboxes{
display:flex;
gap:20px;
margin-bottom:15px;
}

.status-checkboxes label{
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
min-width:1200px;
}

table th, table td{
border:1px solid #cbd5e1;
padding:10px;
text-align:left;
font-size:14px;
}

table th{
background:#06b6d4;
color:white;
}

.actions button{
margin-right:5px;
padding:5px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.actions .edit{
background:#22c55e;
color:white;
}

.actions .delete{
background:#ef4444;
color:white;
}

#mensagem{
display:none;
padding:10px;
margin-bottom:20px;
background-color:#f8d7da;
color:#721c24;
border-radius:5px;
border:1px solid #f5c6cb;
}

</style>
</head>

<body>

<!-- BOTÃO VOLTAR -->
<div class="back-btn" onclick="voltarPagina()">⬅️</div>

<div class="container">

<h1>Planificar Assistências Direção</h1>

<div id="mensagem"></div>

<form id="formAssistencia">

<input type="hidden" id="assistenciaId">

<select id="professor_assistido_nome" required>
<option value="">Professor Assistido</option>
</select>

<select id="diretor_assistente_nome" required>
<option value="">Direção Assistente</option>
</select>

<input type="text" id="classe" placeholder="Classe" required>
<input type="text" id="turma" placeholder="Turma" required>
<input type="text" id="disciplina" placeholder="Disciplina" required>
<input type="text" id="numero_sala" placeholder="Número da Sala" required>
<input type="text" id="localizacao_sala" placeholder="Localização da Sala" required>

<select id="trimestre" required>
<option value="">Trimestre</option>
<option value="1">1º</option>
<option value="2">2º</option>
<option value="3">3º</option>
</select>

<input type="datetime-local" id="data_hora" required>

<button type="submit">Salvar</button>

</form>

<div class="status-checkboxes">

<label>
<input type="checkbox" onchange="alterarStatusTrimestreGlobal(1,this.checked)">
Aprovar 1º Trimestre
</label>

<label>
<input type="checkbox" onchange="alterarStatusTrimestreGlobal(2,this.checked)">
Aprovar 2º Trimestre
</label>

<label>
<input type="checkbox" onchange="alterarStatusTrimestreGlobal(3,this.checked)">
Aprovar 3º Trimestre
</label>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Assistido</th>
<th>Direção</th>
<th>Classe</th>
<th>Turma</th>
<th>Disciplina</th>
<th>Nº Sala</th>
<th>Localização</th>
<th>Trimestre</th>
<th>Data/Hora</th>
<th>Status</th>
<th>Criado Em</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="assistenciasBody"></tbody>

</table>

</div>

<script>

/* BOTÃO VOLTAR */
function voltarPagina(){
    window.history.back();
}

const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
? "http://127.0.0.1:8000"
: "https://esg-dunda.onrender.com";

/* resto do seu JS continua igual... */

</script>

</body>
</html>
